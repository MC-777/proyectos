services:
  app:
    build:
      context: ./minibloglaravel
      dockerfile: Dockerfile
    image: laravel-app
    container_name: laravel_app
    restart: unless-stopped
    tty: true
    user: "root"
    environment:
      SERVICE_NAME: app
    volumes:
      - ./minibloglaravel:/var/www
    networks:
      - laravel-network
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "composer install --no-interaction &&
             php artisan key:generate --force &&
             php artisan jwt:secret --force &&
             php artisan migrate --force --seed &&
             chmod -R 777 storage bootstrap/cache &&
             php-fpm -F -d listen=0.0.0.0:9000"

  webserver:
    image: nginx:alpine
    container_name: laravelwebserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./minibloglaravel:/var/www
      - ./minibloglaravel/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-network
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: laravel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bd_blog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Pw_777
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - laravel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bd_blog"]
      interval: 5s
      timeout: 5s
      retries: 5

  jspringboot:
    build:
      context: ./jspringboot
      dockerfile: Dockerfile
    container_name: springboot_app
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - LARAVEL_URL=http://laravelwebserver/api
    networks:
      - laravel-network
    depends_on:
      - webserver

networks:
  laravel-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
